name: restart-cheryl-gateway

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RESTART to confirm"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.inputs.confirm == 'RESTART' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Run restart
        id: run
        run: |
          START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          set +e
          OUTPUT=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "bash /home/david/th-fleet-dashboard/scripts/restart-cheryl-gateway.sh" 2>&1)
          EXIT=$?
          set -e
          END=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          exit $EXIT

      - name: Append to history
        if: always()
        run: |
          EXIT_CODE="${{ steps.run.outputs.exit_code }}"
          [ -z "$EXIT_CODE" ] && EXIT_CODE=1
          OUTPUT="${{ steps.run.outputs.output }}"
          [ -z "$OUTPUT" ] && OUTPUT="Step did not run or failed early"
          jq -n \
            --arg type "action" \
            --arg t "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg action "restart-cheryl-gateway" \
            --arg actor "${{ github.actor }}" \
            --arg run_id "${{ github.run_id }}" \
            --argjson exit_code "$EXIT_CODE" \
            --arg stderr "$OUTPUT" \
            '{type:$type, timestamp:$t, action:$action, actor:$actor, workflow_run_id:$run_id, exit_code:$exit_code, output:$stderr}' \
            -c >> docs/history.jsonl
          git config user.name "gh-actions"
          git config user.email "actions@thirdhorizon.local"
          git pull --rebase origin master || true
          git add docs/history.jsonl
          git commit -m "action $(date -u +%FT%TZ) restart-cheryl-gateway" || true
          git push || git push --force-with-lease || true

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
        run: |
          STATUS="${{ steps.run.outputs.exit_code }}"
          ICON="✅"; RESULT="succeeded"
          if [ "$STATUS" != "0" ]; then
            ICON="❌"
            RESULT="failed (exit $STATUS)"
          fi
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"$ICON restart-cheryl-gateway $RESULT — actor ${{ github.actor }} — run ${{ github.run_id }}\"}"
          fi
